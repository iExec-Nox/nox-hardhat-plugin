name: Nox Hardhat plugin CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{github.ref}}-ci
  cancel-in-progress: true

jobs:
  ci:
    name: Nox Hardhat plugin Default (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      # TODO: remove when Nox images are available on docker.io
      - name: Login to Docker registry
        run: echo "${{ secrets.DOCKERREGIS_PASSWORD }}" | docker login docker-regis.iex.ec -u "${{ secrets.DOCKERREGIS_USERNAME }}" --password-stdin

      # `pnpm test` recursively runs plugin unit tests + example-project's
      # `pnpm hardhat test`, which brings up the full docker stack end-to-end.
      - name: Test
        run: pnpm test
